services:
  postgres:
    image: postgres:16-alpine
    container_name: pawn-postgres
    environment:
      POSTGRES_DB: pawn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pawn_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawn"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pawn-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pawn
      API_PORT: 8787
    ports:
      - "8787:8787"
    restart: unless-stopped

volumes:
  pawn_pg_data:
